<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>编辑个人资料 - MyLifeRepo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #0d1117;
      color: #c9d1d9;
      padding: 40px 20px;
    }
    .light-mode {
      background: #ffffff;
      color: #24292f;
    }
    .form-control, .form-control:focus {
      background: #161b22;
      color: #c9d1d9;
      border-color: #30363d;
    }
    .light-mode .form-control, .light-mode .form-control:focus {
      background: #ffffff;
      color: #24292f;
      border-color: #d0d7de;
    }
    .intro-textarea {
      height: 180px;
      resize: vertical;
    }
  </style>
</head>
<body>

<div class="container">
  <h2 class="mb-4">编辑个人资料</h2>
  
  <div class="row">
    <div class="col-md-8">
      <div class="mb-3">
        <label class="form-label">头像地址</label>
        <input type="text" id="avatarInput" class="form-control" placeholder="https://...">
      </div>
      <div class="mb-3">
        <label class="form-label">用户名</label>
        <input type="text" id="nameInput" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">个人签名（Bio）</label>
        <input type="text" id="bioInput" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">籍贯</label>
        <input type="text" id="hometownInput" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">生日</label>
        <input type="date" id="birthdayInput" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">爱好（用逗号分隔）</label>
        <input type="text" id="hobbyInput" class="form-control">
      </div>
      
      <!-- 新增：自我介绍大文本框 -->
      <div class="mb-4">
        <label class="form-label">自我介绍</label>
        <textarea id="introInput" class="form-control intro-textarea" placeholder="写一点关于自己的介绍..."></textarea>
      </div>

      <button onclick="saveSettings()" class="btn btn-success me-2">保存修改</button>
      <button onclick="window.location.href='index.html'" class="btn btn-secondary">返回首页</button>
    </div>
  </div>
</div>

<script>
function loadSettings() {
  document.getElementById('avatarInput').value = localStorage.getItem('avatar') || "https://via.placeholder.com/160";
  document.getElementById('nameInput').value = localStorage.getItem('name') || "MYJINS";
  document.getElementById('bioInput').value = localStorage.getItem('bio') || "每天记录一点点，让生活更有仪式感。";
  document.getElementById('hometownInput').value = localStorage.getItem('hometown') || "香港";
  document.getElementById('birthdayInput').value = localStorage.getItem('birthday') || "2005-05-15";
  document.getElementById('hobbyInput').value = localStorage.getItem('hobby') || "摄影,阅读,旅行";
  document.getElementById('introInput').value = localStorage.getItem('intro') || "这里是我的自我介绍...";
}

function saveSettings() {
  localStorage.setItem('avatar', document.getElementById('avatarInput').value);
  localStorage.setItem('name', document.getElementById('nameInput').value);
  localStorage.setItem('bio', document.getElementById('bioInput').value);
  localStorage.setItem('hometown', document.getElementById('hometownInput').value);
  localStorage.setItem('birthday', document.getElementById('birthdayInput').value);
  localStorage.setItem('hobby', document.getElementById('hobbyInput').value);
  localStorage.setItem('intro', document.getElementById('introInput').value);

  alert("保存成功！");
  window.location.href = "index.html";
}

window.onload = loadSettings;
</script>
</body>
</html>
