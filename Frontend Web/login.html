<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - MyLifeRepo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0d1117; color: #c9d1d9; height: 100vh; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
    .light-mode { background: #f8f9fa; color: #24292f; }
    .login-card { background: #161b22; border: 1px solid #30363d; border-radius: 16px; width: 400px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .light-mode .login-card { background: #ffffff; border-color: #d0d7de; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .form-control { background: #0d1117; border-color: #30363d; color: #fff; }
    .light-mode .form-control { background: #fff; border-color: #d0d7de; color: #000; }
  </style>
</head>
<body>

<div class="login-card">
  <h3 class="text-center mb-2">📦 MyLifeRepo</h3>
  <h5 class="text-center mb-4">欢迎回来</h5>
  <div id="errorMsg" class="text-danger small mb-3 text-center"></div>

  <div class="mb-3">
    <label class="form-label">用户名</label>
    <input type="text" id="username" class="form-control" placeholder="输入用户名" value="MYJINS">
  </div>
  <div class="mb-4">
    <label class="form-label">密码</label>
    <input type="password" id="password" class="form-control" placeholder="输入密码" value="123456">
  </div>

  <button onclick="login()" class="btn btn-primary w-100 py-2 mb-3">立即登录</button>

  <div class="d-flex justify-content-between">
    <button onclick="alert('演示模式：请直接登录')" class="btn btn-link text-info text-decoration-none small">忘记密码？</button>
    <button onclick="register()" class="btn btn-link text-primary text-decoration-none small">注册账号</button>
  </div>
</div>

<script>
// 初始化默认账号
function initDemoAccount() {
  const users = JSON.parse(localStorage.getItem('users')) || {};
  if (!users['MYJINS']) {
    users['MYJINS'] = '123456';
    localStorage.setItem('users', JSON.stringify(users));
  }
}

function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const users = JSON.parse(localStorage.getItem('users')) || {};

  if (!users[username]) {
    document.getElementById('errorMsg').innerText = "用户不存在！请先注册";
    return;
  }
  if (users[username] !== password) {
    document.getElementById('errorMsg').innerText = "密码错误！";
    return;
  }

  localStorage.setItem('username', username);
  window.location.href = 'index.html';
}

function register() {
  const user = prompt("新用户名:");
  const pass = prompt("新密码 (至少6位):");
  if (user && pass && pass.length >= 6) {
    const users = JSON.parse(localStorage.getItem('users')) || {};
    if (users[user]) return alert("账号已存在");
    users[user] = pass;
    localStorage.setItem('users', JSON.stringify(users));
    alert("注册成功，请登录！");
  }
}

window.onload = () => {
  initDemoAccount();
  if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
};
</script>
</body>
</html>
