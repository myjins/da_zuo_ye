<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - MyLifeRepo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #0d1117;
      color: #c9d1d9;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .light-mode { background: #ffffff; color: #24292f; }
    .login-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      width: 380px;
      padding: 40px;
    }
    .light-mode .login-card {
      background: #ffffff;
      border-color: #d0d7de;
    }
  </style>
</head>
<body>

<div class="login-card">
  <h3 class="text-center mb-4">MyLifeRepo</h3>
  <h5 class="text-center mb-4">欢迎回来</h5>
  
  <div class="mb-3">
    <label class="form-label">用户名</label>
    <input type="text" id="username" class="form-control" placeholder="输入用户名" value="MYJINS">
  </div>
  
  <div class="mb-4">
    <label class="form-label">密码</label>
    <input type="password" id="password" class="form-control" placeholder="输入密码" value="123456">
  </div>

  <button onclick="login()" class="btn btn-primary w-100 py-2 mb-3">登录</button>

  <!-- 新增按钮 -->
  <div class="d-flex justify-content-between">
    <button onclick="forgotPassword()" class="btn btn-link text-muted">忘记密码？</button>
    <button onclick="register()" class="btn btn-link text-primary">注册账号</button>
  </div>

  <div class="text-center mt-4 small text-muted">
    演示模式<br>用户名：MYJINS &nbsp; 密码：123456
  </div>
</div>

<script>
function login() {
  const username = document.getElementById('username').value.trim();
  if (!username) return alert("请输入用户名！");
  localStorage.setItem('username', username);
  window.location.href = 'index.html';
}

function forgotPassword() {
  alert("忘记密码功能暂未开放（演示模式）");
}

function register() {
  alert("注册功能暂未开放（演示模式）");
}

// 支持浅色模式
if (localStorage.getItem('theme') === 'light') {
  document.body.classList.add('light-mode');
}
</script>
</body>
</html>
